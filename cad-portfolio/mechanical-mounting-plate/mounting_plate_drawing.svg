<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="850" viewBox="0 0 1100 850">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#111"/>
    </marker>
  </defs>
  <rect width="1100" height="850" fill="#ffffff"/>
  <text x="40" y="40" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111">Mechanical Mounting Plate — 2D CAD Drawing</text>
  <text x="40" y="68" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#444">Kristen Fenwick | Scale 1:1 | Units: mm</text>

  <!-- Title block -->
  <rect x="760" y="620" width="300" height="200" fill="none" stroke="#111" stroke-width="2"/>
  <line x1="760" y1="660" x2="1060" y2="660" stroke="#111" stroke-width="1"/>
  <line x1="760" y1="700" x2="1060" y2="700" stroke="#111" stroke-width="1"/>
  <line x1="760" y1="740" x2="1060" y2="740" stroke="#111" stroke-width="1"/>
  <line x1="910" y1="620" x2="910" y2="820" stroke="#111" stroke-width="1"/>
  <text x="770" y="645" font-family="Arial" font-size="13" fill="#111">TITLE</text>
  <text x="920" y="645" font-family="Arial" font-size="13" fill="#111">Mounting Plate</text>
  <text x="770" y="685" font-family="Arial" font-size="13" fill="#111">MATERIAL</text>
  <text x="920" y="685" font-family="Arial" font-size="13" fill="#111">6061-T6 Aluminum</text>
  <text x="770" y="725" font-family="Arial" font-size="13" fill="#111">DRAWN BY</text>
  <text x="920" y="725" font-family="Arial" font-size="13" fill="#111">K. Fenwick</text>
  <text x="770" y="765" font-family="Arial" font-size="13" fill="#111">DATE</text>
  <text x="920" y="765" font-family="Arial" font-size="13" fill="#111">Jun 2026</text>
  <text x="770" y="805" font-family="Arial" font-size="13" fill="#111">SHEET</text>
  <text x="920" y="805" font-family="Arial" font-size="13" fill="#111">1 of 1</text>

  <!-- Top view -->
  <text x="120" y="120" font-family="Arial" font-size="16" font-weight="600" fill="#111">TOP VIEW</text>
  <g transform="translate(120,140)">
    <rect x="0" y="0" width="360" height="180" fill="none" stroke="#111" stroke-width="3"/>
    <line x1="180" y1="-20" x2="180" y2="200" stroke="#888" stroke-width="1" stroke-dasharray="8 6"/>
    <line x1="-20" y1="90" x2="380" y2="90" stroke="#888" stroke-width="1" stroke-dasharray="8 6"/>
    <circle cx="60" cy="90" r="16" fill="none" stroke="#111" stroke-width="2"/>
    <circle cx="300" cy="90" r="16" fill="none" stroke="#111" stroke-width="2"/>
    <circle cx="60" cy="90" r="2" fill="#111"/>
    <circle cx="300" cy="90" r="2" fill="#111"/>
    <!-- width dim -->
    <line x1="0" y1="220" x2="360" y2="220" stroke="#111" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="150" y="245" font-family="Arial" font-size="14" fill="#111">120</text>
    <!-- hole spacing -->
    <line x1="60" y1="250" x2="300" y2="250" stroke="#111" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="165" y="275" font-family="Arial" font-size="14" fill="#111">240</text>
    <!-- hole diameter -->
    <line x1="44" y1="90" x2="76" y2="90" stroke="#111" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="20" y="70" font-family="Arial" font-size="14" fill="#111">Ø32</text>
  </g>

  <!-- Front view -->
  <text x="120" y="470" font-family="Arial" font-size="16" font-weight="600" fill="#111">FRONT VIEW</text>
  <g transform="translate(120,490)">
    <rect x="0" y="0" width="360" height="48" fill="none" stroke="#111" stroke-width="3"/>
    <line x1="180" y1="-20" x2="180" y2="68" stroke="#888" stroke-width="1" stroke-dasharray="8 6"/>
    <line x1="0" y1="88" x2="360" y2="88" stroke="#111" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="165" y="110" font-family="Arial" font-size="14" fill="#111">120</text>
    <line x1="380" y1="0" x2="380" y2="48" stroke="#111" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <text x="392" y="30" font-family="Arial" font-size="14" fill="#111">16</text>
  </g>

  <!-- Notes -->
  <text x="560" y="160" font-family="Arial" font-size="16" font-weight="600" fill="#111">NOTES</text>
  <text x="560" y="190" font-family="Arial" font-size="14" fill="#333">1. DEBURR ALL EDGES.</text>
  <text x="560" y="215" font-family="Arial" font-size="14" fill="#333">2. HOLE POSITION TOLERANCE ±0.25 mm.</text>
  <text x="560" y="240" font-family="Arial" font-size="14" fill="#333">3. BREAK SHARP CORNERS 0.5 mm MAX.</text>
  <text x="560" y="265" font-family="Arial" font-size="14" fill="#333">4. UNLESS OTHERWISE SPECIFIED, DIMENSIONS IN mm.</text>
</svg>